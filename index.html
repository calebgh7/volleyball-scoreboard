<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Scoreboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .scoreboard-container {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
        }

        .sponsor-logo {
            width: 20%;
            background-color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .sponsor-logo img {
            max-width: 100%;
            max-height: 80px;
        }

        .score-section {
            display: flex;
            width: 80%;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(145deg, #666, #222);
        }

        .team {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .team-name {
            font-size: 1.8em;
            color: #fff;
            font-weight: bold;
        }

        .score {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
            padding: 5px 20px;
            border-radius: 5px;
            background-color: #004d00; /* Green background for score */
        }

        .score.other {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="scoreboard-container">
        <!-- Sponsor Section -->
        <div class="sponsor-logo">
            <img src="sponsor-logo.png" alt="Sponsor Logo">
        </div>

        <!-- Score Section -->
        <div class="score-section">
            <!-- Team A -->
            <div class="team">
                <img src="team1-logo.png" alt="Team A Logo" class="team-logo">
                <div class="team-name">NOVA 16s</div>
            </div>
            <div id="score1" class="score">2</div>

            <!-- Team B -->
            <div id="score2" class="score other">1</div>
            <div class="team">
                <img src="team2-logo.png" alt="Team B Logo" class="team-logo">
                <div class="team-name">Beauty2Beast</div>
            </div>
        </div>
    </div>

    <script>
        // Script for updating scores dynamically
        function updateScore(team, delta) {
            const scoreElement = document.getElementById('score' + (team === 'team1' ? 1 : 2));
            let currentScore = parseInt(scoreElement.innerText);
            currentScore = Math.max(0, currentScore + delta); // Prevent negative scores
            scoreElement.innerText = currentScore;
        }
    </script>
</body>
</html>
