<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Scoreboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #22222200;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .scoreboard-container {
            display: flex;
            align-items: center;
            width: 90%;
            max-width: 800px;
            background-color: #333333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
        }

        .sponsor-logo {
            width: 10%;
            background-color: #44444400;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .sponsor-logo img {
            max-width: 100%;
            max-height: 80px;
        }

        .score-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 80%;
        }

        .team-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 20px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .team-section:last-child {
            margin-bottom: 0;
        }

        /* Solid colors for each team */
        .team-section.team1 {
            background-color: #9682EB; /* Blue for Team A */
            color: #fff;
        }

        .team-section.team2 {
            background-color: #040404; /* Green for Team B */
            color: #fff;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-logo {
            max-height: 50px;
            max-width: 80px;
            object-fit: contain;
        }

        .team-name {
            font-size: 2.3em;
            font-weight: bold;
            color: #fff;
        }

        .score {
            font-size: 3.1em;
            font-weight: bold;
            color: #fff;
            padding: 5px 20px;
            border-radius: 5px;
            min-width: 70px;
            text-align: center;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls button,
        .controls input[type="text"] {
            font-size: 1em;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .controls button {
            color: #fff;
            background-color: #007bff;
            transition: background-color 0.3s ease;
        }

        .controls button:hover {
            background-color: #0056b3;
        }

        .controls input[type="text"] {
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="scoreboard-container">
        <!-- Sponsor Section -->
        <div class="sponsor-logo">
            <img id="sponsor-img" src="HP.jpg" alt="Sponsor Logo">
        </div>

        <!-- Score Section -->
        <div class="score-section">
            <!-- Team A Section -->
            <div class="team-section team1">
                <div class="team">
                    <img id="team1-logo" src="star.png" alt="Team A Logo" class="team-logo">
                    <div id="team1-name" class="team-name">Team A</div>
                </div>
                <div id="score1" class="score">0</div>
            </div>

            <!-- Team B Section -->
            <div class="team-section team2">
                <div class="team">
                    <img id="team2-logo" src="team2-logo.png" alt="" class="team-logo">
                    <div id="team2-name" class="team-name">Team B</div>
                </div>
                <div id="score2" class="score">0</div>
            </div>
        </div>
    </div>

    <!-- Controls Section -->
    <div class="controls">
        <!-- Team Name Inputs -->
        <div>
            <label for="team1-input">Team A Name:</label>
            <input type="text" id="team1-input" placeholder="Enter Team A Name" oninput="updateTeamName('team1', this.value)">
        </div>
        <div>
            <label for="team2-input">Team B Name:</label>
            <input type="text" id="team2-input" placeholder="Enter Team B Name" oninput="updateTeamName('team2', this.value)">
        </div>

        <!-- Score Adjustment Buttons -->
        <div>
            <button onclick="updateScore('team1', 1)">+1 Team A</button>
            <button onclick="updateScore('team1', -1)">-1 Team A</button>
            <button onclick="updateScore('team2', 1)">+1 Team B</button>
            <button onclick="updateScore('team2', -1)">-1 Team B</button>
        </div>
    </div>

    <script>
        // Function to update scores dynamically
        function updateScore(team, delta) {
            const scoreElement = document.getElementById('score' + (team === 'team1' ? 1 : 2));
            let currentScore = parseInt(scoreElement.innerText);
            currentScore = Math.max(0, currentScore + delta); // Prevent negative scores
            scoreElement.innerText = currentScore;
        }

        // Function to update team names based on user input
        function updateTeamName(team, newName) {
            const teamNameElement = document.getElementById(team + '-name');
            teamNameElement.innerText = newName || (team === 'team1' ? 'Team A' : 'Team B');
        }

        // Function to hide logos if no image source is provided
        function hideEmptyImages() {
            const images = document.querySelectorAll('img');
            images.forEach(img => {
                img.onerror = () => img.style.display = 'none'; // Hide image if it fails to load
                if (!img.src || img.src.endsWith('placeholder.png')) {
                    img.style.display = 'none';
                } else {
                    img.style.display = 'block';
                }
            });
        }

        // Run the function on page load
        window.onload = hideEmptyImages;
    </script>
</body>
</html>
