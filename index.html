<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Scoreboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .scoreboard-container {
            display: flex;
            align-items: center;
            width: 90%;
            max-width: 800px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
        }

        .sponsor-logo {
            width: 20%;
            background-color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .sponsor-logo img {
            max-width: 100%;
            max-height: 80px;
        }

        .score-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 80%;
        }

        .team-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 20px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .team-section:last-child {
            margin-bottom: 0;
        }

        /* Solid colors for each team */
        .team-section.team1 {
            background-color: #9682EB; /* Blue for Team A */
            color: #fff;
        }

        .team-section.team2 {
            background-color: #1a1c1b; /* Green for Team B */
            color: #fff;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-logo {
            width: 50px;
            height: 50px;
            border: 2px solid #fff;
        }

        .team-name {
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
        }

        .team-name input {
            font-size: 1.8em;
            font-weight: bold;
            color: #000;
            border: none;
            width: 100%;
        }

        .score {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
            padding: 5px 20px;
            border-radius: 5px;
            min-width: 70px;
            text-align: center;
        }

        .controls {
            margin-top: 20px;
        }

        .controls button {
            font-size: 1em;
            margin: 5px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
            background-color: #007bff;
            transition: background-color 0.3s ease;
        }

        .controls button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="scoreboard-container">
        <!-- Sponsor Section -->
        <div class="sponsor-logo">
            <img id="sponsor-img" src="sponsor-logo.png" alt="Sponsor Logo">
        </div>

        <!-- Score Section -->
        <div class="score-section">
            <!-- Team A Section -->
            <div class="team-section team1">
                <div class="team">
                    <img id="team1-logo" src="team1-logo.png" alt="Team A Logo" class="team-logo">
                    <div id="team1-name" class="team-name" onclick="editTeamName('team1-name')">NOVA 16s</div>
                </div>
                <div id="score1" class="score">0</div>
            </div>

            <!-- Team B Section -->
            <div class="team-section team2">
                <div class="team">
                    <img id="team2-logo" src="team2-logo.png" alt="Team B Logo" class="team-logo">
                    <div id="team2-name" class="team-name" onclick="editTeamName('team2-name')">Beauty2Beast</div>
                </div>
                <div id="score2" class="score">0</div>
            </div>
        </div>
    </div>

    <!-- Controls Section -->
    <div class="controls">
        <button onclick="updateScore('team1', 1)">+1 Team A</button>
        <button onclick="updateScore('team1', -1)">-1 Team A</button>
        <button onclick="updateScore('team2', 1)">+1 Team B</button>
        <button onclick="updateScore('team2', -1)">-1 Team B</button>
    </div>

    <script>
        // Function to update scores dynamically
        function updateScore(team, delta) {
            const scoreElement = document.getElementById('score' + (team === 'team1' ? 1 : 2));
            let currentScore = parseInt(scoreElement.innerText);
            currentScore = Math.max(0, currentScore + delta); // Prevent negative scores
            scoreElement.innerText = currentScore;
        }

        // Function to edit team names
        function editTeamName(elementId) {
            const teamNameElement = document.getElementById(elementId);
            const currentName = teamNameElement.innerText;

            // Replace the team name with an input field for editing
            teamNameElement.innerHTML = `<input type="text" value="${currentName}" onblur="saveTeamName('${elementId}', this)" autofocus>`;
        }

        // Function to save the updated team name
        function saveTeamName(elementId, inputElement) {
            const newName = inputElement.value;
            document.getElementById(elementId).innerHTML = newName;
        }

        // Function to hide logos if no image source is provided
        function hideEmptyImages() {
            const images = document.querySelectorAll('img');
            images.forEach(img => {
                img.onerror = () => img.style.display = 'none'; // Hide image if it fails to load
                if (!img.src || img.src.endsWith('placeholder.png')) {
                    img.style.display = 'none';
                } else {
                    img.style.display = 'block';
                }
            });
        }

        // Run the function on page load
        window.onload = hideEmptyImages;
    </script>
</body>
</html>
